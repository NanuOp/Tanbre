[env:tanbre-watch]
board = tanbre-watch
board_build.partitions = custom_8Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/tanbre-watch>
build_flags =
	${env.build_flags}
	-Iboards/tanbre-watch
	-Os
	-DCORE_DEBUG_LEVEL=1
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DDEVICE_NAME='"Tanbre Watch"'
	-DARDUINO_USB_CDC_ON_BOOT=1
	-UUSE_TFT_eSPI_TOUCH

lib_deps =
	${env.lib_deps}
	lovyan03/LovyanGFX @ ^1.2.7
	https://github.com/bmorcelli/ESP32_Button
